name: BattleBrain
options:
  bundleIdPrefix: dev.edwardzhang
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
targets:
  BattleBrain:
    type: application
    platform: iOS
    sources:
      - path: BattleBrain
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.edwardzhang.BattleBrain
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
